当以下事件发生时，对应的变量需要更新：

1. 每次对话开始（新的一天）：
   - 日 += 1（如果日达到最大值则触发轮回重置）

2. 执行行动后：
   - 剩余时间 -= 1（如果触发了任务则减对应时间）
   - 如果剩余时间 <= 0，触发"一天结束"

3. 通过性骚扰系统回复POWER时：
   - POWER += 对应数值（不超过999）
   - 更新对应的好感度/忠诚心

4. 购买道具时：
   - 金钱 -= 价格
   - 道具添加到主角物品栏

5. 完成核心任务时：
   - 核心任务已解决 = true

6. 切换曲风时：
   - 曲风 = "活泼" | "硬汉" | "轻快"

7. 时间循环重置时：
   - 轮回 += 1
   - 日 = 1
   - 剩余时间 = 5
   - 保留POWER、金钱、道具、任务进度
